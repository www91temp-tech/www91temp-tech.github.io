name: 自動更新 notes.json

# 觸發時機：
# 1. 每次有人 push 到 main 分支時（你在 GitHub 網頁上新增/編輯/刪除檔案後 commit，就算 push）
# 2. 也可以在 GitHub 網頁的 Actions 頁籤手動點「Run workflow」來手動觸發
on:
  push:
    branches:
      - main
  workflow_dispatch:

# 避免同一時間有多個 workflow 同時跑造成衝突
concurrency:
  group: notes-json-update
  cancel-in-progress: false

jobs:
  update-notes-json:
    runs-on: ubuntu-latest

    # 讓這個 job 有權限可以 commit 並 push 回 repo
    permissions:
      contents: write

    steps:
      - name: 取得 repo 內容
        uses: actions/checkout@v4
        with:
          # 取得完整歷史，避免 push 時發生奇怪的衝突
          fetch-depth: 0

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 執行 generate_notes_json.py
        run: python3 generate_notes_json.py

      - name: 檢查 notes.json 是否有變化
        id: check_changes
        run: |
          if git diff --quiet notes.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 自動 commit 並 push 更新後的 notes.json
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notes.json
          # [skip ci] 避免這次自動 commit 再次觸發本 workflow，造成無限迴圈
          git commit -m "🤖 自動更新 notes.json [skip ci]"
          git push

      - name: 沒有變化時的提示
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "notes.json 沒有變化，不需要 commit。"
