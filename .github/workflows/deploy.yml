name: 自動更新 notes.json 並部署

on:
  push:
    branches:
      - main
  workflow_dispatch:

# 新 push 進來會自動取消還在跑的舊部署，不再互相衝突
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 取得 repo 內容
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 執行 generate_notes_json.py
        run: python3 generate_notes_json.py

      - name: 檢查 notes.json 是否有變化
        id: check_changes
        run: |
          if git diff --quiet notes.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 自動 commit 更新後的 notes.json
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notes.json
          git commit -m "🤖 自動更新 notes.json"
          git pull --rebase origin main
          git push

      - name: 設定 Pages
        uses: actions/configure-pages@v5

      - name: 上傳成品
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
