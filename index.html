<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人首頁 | Joy915</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #24292e;
            --link-color: #0366d6;
            --secondary-text: #586069;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            max-width: 650px;
            width: 90%;
            padding: 3rem 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        p.description {
            font-size: 1.1rem;
            color: var(--secondary-text);
            margin-bottom: 1rem;
        }

        /* 搜尋框 */
        .search-box {
            width: 100%;
            box-sizing: border-box;
            padding: 0.7rem 1rem;
            font-size: 1rem;
            border: 1px solid #d1d5da;
            border-radius: 6px;
            margin-bottom: 2rem;
            font-family: inherit;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--link-color);
            box-shadow: 0 0 0 3px rgba(3, 102, 214, 0.15);
        }

        /* 分類區塊樣式：用 <details> 達成收合效果 */
        .category-section {
            margin-bottom: 1rem;
            text-align: left;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.5rem;
        }

        .category-section summary {
            list-style: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0.2rem;
            font-size: 1.3rem;
            font-weight: 600;
            user-select: none;
        }

        .category-section summary::-webkit-details-marker {
            display: none;
        }

        .category-section summary .count {
            font-size: 0.95rem;
            font-weight: 400;
            color: var(--secondary-text);
            margin-left: 0.5rem;
        }

        .category-section summary .arrow {
            margin-left: auto;
            padding-left: 0.75rem;
            font-size: 0.9rem;
            color: var(--secondary-text);
            transition: transform 0.2s ease;
        }

        .category-section[open] summary .arrow {
            transform: rotate(90deg);
        }

        /* 筆記清單樣式 */
        #file-list ul {
            list-style: none;
            padding: 0;
            margin: 0.5rem 0 1rem 0;
        }

        #file-list li {
            margin: 10px 0;
            padding: 10px 15px;
            border: 1px solid #eaecef;
            border-radius: 6px;
            transition: background 0.2s;
        }

        #file-list li:hover {
            background-color: #f6f8fa;
        }

        #file-list li.hidden {
            display: none;
        }

        #file-list a {
            color: var(--link-color);
            text-decoration: none;
            font-weight: 500;
            display: block;
        }

        .no-results {
            color: var(--secondary-text);
            padding: 2rem 0;
        }

        footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>👋 Hi 學習者</h1>
        <p class="description">這是我的 GitHub Pages 空間，以下是我的學習筆記：</p>

        <input
            type="text"
            id="search-input"
            class="search-box"
            placeholder="🔍 搜尋筆記標題..."
            autocomplete="off"
        >

        <div id="file-list">讀取筆記清單中...</div>

        <footer>
            &copy; 2026 Joy915. Built with ❤️ and Minimal CSS.
        </footer>
    </div>

    <script>
        // 讀取本地維護的 notes.json，不再即時呼叫 GitHub API
        // 新增筆記時：把檔案放進對應資料夾，並在 notes.json 的對應 category 補上 {title, file}
        const MANIFEST_URL = 'notes.json';

        // 記住使用者上次展開的分類（純前端，不影響資料結構）
        const STORAGE_KEY = 'joy915_open_categories';

        function getOpenState() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
            } catch {
                return {};
            }
        }

        function saveOpenState(state) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } catch {
                // localStorage 不可用時靜默失敗，不影響核心功能
            }
        }

        async function loadFiles() {
            const listElement = document.getElementById('file-list');

            try {
                const response = await fetch(MANIFEST_URL);
                if (!response.ok) throw new Error('無法取得 notes.json');

                const data = await response.json();
                const categories = data.categories || [];

                if (categories.length === 0) {
                    listElement.innerHTML = '<p>目前尚無筆記檔案。</p>';
                    return;
                }

                listElement.innerHTML = '';
                const openState = getOpenState();

                categories.forEach(category => {
                    const notes = category.notes || [];
                    if (notes.length === 0) return; // 跳過空分類，避免顯示空白區塊

                    const details = document.createElement('details');
                    details.className = 'category-section';
                    details.dataset.categoryKey = category.key;

                    // 預設：第一個分類展開，其餘收合；若使用者有歷史紀錄則套用歷史紀錄
                    const hasHistory = Object.prototype.hasOwnProperty.call(openState, category.key);
                    details.open = hasHistory ? openState[category.key] : (categories[0].key === category.key);

                    details.addEventListener('toggle', () => {
                        const state = getOpenState();
                        state[category.key] = details.open;
                        saveOpenState(state);
                    });

                    const summary = document.createElement('summary');
                    summary.innerHTML = `${category.label} <span class="count">· ${notes.length} 篇</span><span class="arrow">▶</span>`;
                    details.appendChild(summary);

                    const ul = document.createElement('ul');
                    notes.forEach(note => {
                        const li = document.createElement('li');
                        const href = `${category.folder}/${note.file}`;
                        li.dataset.title = note.title.toLowerCase();
                        li.innerHTML = `<a href="${href}">${note.title}</a>`;
                        ul.appendChild(li);
                    });
                    details.appendChild(ul);

                    listElement.appendChild(details);
                });

                setupSearch();

            } catch (error) {
                console.error(error);
                listElement.innerHTML = '<p>載入失敗，請確認 notes.json 是否存在且格式正確。</p>';
            }
        }

        function setupSearch() {
            const input = document.getElementById('search-input');
            const listElement = document.getElementById('file-list');

            input.addEventListener('input', () => {
                const query = input.value.trim().toLowerCase();
                const sections = listElement.querySelectorAll('.category-section');
                let totalVisible = 0;

                sections.forEach(section => {
                    const items = section.querySelectorAll('li');
                    let visibleInSection = 0;

                    items.forEach(li => {
                        const matches = query === '' || li.dataset.title.includes(query);
                        li.classList.toggle('hidden', !matches);
                        if (matches) visibleInSection++;
                    });

                    totalVisible += visibleInSection;
                    section.style.display = visibleInSection === 0 ? 'none' : '';

                    // 搜尋時自動展開有結果的分類，清空搜尋則恢復原狀
                    if (query !== '' && visibleInSection > 0) {
                        section.open = true;
                    }
                });

                let noResultsEl = listElement.querySelector('.no-results');
                if (totalVisible === 0 && query !== '') {
                    if (!noResultsEl) {
                        noResultsEl = document.createElement('p');
                        noResultsEl.className = 'no-results';
                        noResultsEl.textContent = '找不到符合的筆記。';
                        listElement.appendChild(noResultsEl);
                    }
                } else if (noResultsEl) {
                    noResultsEl.remove();
                }
            });
        }

        loadFiles();
    </script>

</body>
</html>
