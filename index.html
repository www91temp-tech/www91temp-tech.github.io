<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人首頁 | Joy915</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #24292e;
            --link-color: #0366d6;
            --secondary-text: #586069;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* 為了讓內容多時能正常滾動，改為 flex-start */
            min-height: 100vh;
        }

        .container {
            max-width: 650px; /* 稍微加寬一點讓長檔名更好看 */
            width: 90%;
            padding: 3rem 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        p.description {
            font-size: 1.1rem;
            color: var(--secondary-text);
            margin-bottom: 2rem;
        }

        /* 分類區塊樣式 */
        .category-section {
            margin-bottom: 2.5rem;
            text-align: left; /* 讓分類標題與列表靠左，更易於閱讀 */
        }

        .category-title {
            font-size: 1.4rem;
            color: var(--text-color);
            border-bottom: 2px solid #eaecef;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        /* 筆記清單樣式優化 */
        #file-list ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #file-list li {
            margin: 10px 0;
            padding: 10px 15px;
            border: 1px solid #eaecef;
            border-radius: 6px;
            transition: background 0.2s;
        }

        #file-list li:hover {
            background-color: #f6f8fa;
        }

        #file-list a {
            color: var(--link-color);
            text-decoration: none;
            font-weight: 500;
            display: block;
        }

        footer {
            margin-top: 4rem;
            font-size: 0.9rem;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>👋 Hi 學習者</h1>
        <p class="description">這是我的 GitHub Pages 空間，以下是我的學習筆記：</p>

        <div id="file-list">讀取筆記清單中...</div>

        <footer>
            &copy; 2026 Joy915. Built with ❤️ and Minimal CSS.
        </footer>
    </div>

    <script>
        const username = 'www91temp-tech';
        const repo = 'www91temp-tech.github.io';

        // 建立一個字典，用來將英文前綴對應到您想要的中文分類名稱
        const categoryMapping = {
            'Biochemistry': '🧪 生化 (Biochemistry)',
            'Biology': '🧬 普生 (Biology)',
            'OrgChem': '⚗️ 有機化 (OrgChem)'
            // 若未來有其他科目，可以在這裡繼續新增，例如：
            // 'Physics': '⚛️ 物理',
            // 'Pharmacology': '💊 藥理'
        };

        async function loadFiles() {
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
                if (!response.ok) throw new Error('無法取得檔案列表');
                
                const files = await response.json();
                const listElement = document.getElementById('file-list');
                
                // 過濾檔案：必須是 .html 且不是 index.html
                const htmlFiles = files.filter(file => 
                    file.name.endsWith('.html') && 
                    file.name.toLowerCase() !== 'index.html'
                );

                if (htmlFiles.length === 0) {
                    listElement.innerHTML = '<p>目前尚無筆記檔案。</p>';
                    return;
                }

                // 將檔案依據名稱前綴進行分類 (Grouping)
                const groupedFiles = {};

                htmlFiles.forEach(file => {
                    // 去除副檔名並解碼
                    const displayName = decodeURIComponent(file.name.replace('.html', ''));
                    
                    // 以底線 "_" 分割檔名來取得前綴
                    const nameParts = displayName.split('_');
                    let rawCategory = nameParts[0]; 

                    // 檢查有沒有底線，沒有的話歸類為「其他」
                    if (nameParts.length === 1) {
                        rawCategory = 'Other';
                    }

                    // 將前綴轉換為我們設定好的中文名稱（如果沒設定，就保留原本的英文前綴）
                    const finalCategoryName = categoryMapping[rawCategory] || (rawCategory === 'Other' ? '📁 其他筆記' : `📁 ${rawCategory}`);

                    // 將檔案放入對應的分類陣列中
                    if (!groupedFiles[finalCategoryName]) {
                        groupedFiles[finalCategoryName] = [];
                    }
                    groupedFiles[finalCategoryName].push({
                        displayName: displayName,
                        path: file.path
                    });
                });

                // 開始產生 HTML 畫面
                listElement.innerHTML = ''; // 清除載入文字

                // 遍歷所有分類來建立區塊
                for (const [categoryName, categoryFiles] of Object.entries(groupedFiles)) {
                    // 建立分類容器
                    const section = document.createElement('div');
                    section.className = 'category-section';

                    // 建立分類標題
                    const title = document.createElement('h2');
                    title.className = 'category-title';
                    title.textContent = categoryName;
                    section.appendChild(title);

                    // 建立該分類底下的檔案列表
                    const ul = document.createElement('ul');
                    categoryFiles.forEach(fileData => {
                        const li = document.createElement('li');
                        li.innerHTML = `<a href="${fileData.path}">${fileData.displayName}</a>`;
                        ul.appendChild(li);
                    });

                    section.appendChild(ul);
                    listElement.appendChild(section);
                }

            } catch (error) {
                console.error(error);
                document.getElementById('file-list').innerHTML = '<p>載入失敗，請稍後再試。</p>';
            }
        }

        loadFiles();
    </script>

</body>
</html>
