<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人首頁 | Your Name</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #24292e;
            --link-color: #0366d6;
            --secondary-text: #586069;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        p.tagline {
            font-size: 1.2rem;
            color: var(--secondary-text);
            margin-bottom: 2rem;
        }

        .links {
            margin-top: 2rem;
        }

        .links a {
            color: var(--link-color);
            text-decoration: none;
            margin: 0 10px;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .links a:hover {
            text-decoration: underline;
            opacity: 0.8;
        }

        footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>👋 Hi 學習者</h1>
        
        <p>這是我的 GitHub Pages 空間。</p>


        <footer>
            &copy; 2026 Joy915. Built with ❤️ and Minimal CSS.
        </footer>
    </div>

</body>
</html>
